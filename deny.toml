[licenses]
allow = [
  "AGPL-3.0-or-later",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[advisories]
ignore = [
  # All from Bevy, doesn't affect us.
  "RUSTSEC-2024-0436",
  "RUSTSEC-2026-0192",
  "RUSTSEC-2026-0195",
  "RUSTSEC-2026-0194",
]

[bans]
skip-tree = ["bevy"]
skip = [
  { crate = "itertools@0.14.0", reason = "comes from avian" },
  { crate = "itertools@0.15.0", reason = "comes from avian" },
]

[sources]
unknown-git = "allow"
